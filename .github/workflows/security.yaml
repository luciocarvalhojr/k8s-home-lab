name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checkov:
    name: IaC Security Scan (checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: kubernetes,secrets
          output_format: sarif
          output_file_path: checkov.sarif
          skip_check: CKV_K8S_8,CKV_K8S_9  # liveness/readiness probes (not always needed in home-lab)
          soft_fail: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov.sarif

  trivy:
    name: Trivy Misconfiguration Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif
