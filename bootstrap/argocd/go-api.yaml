apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-api
  namespace: argocd
spec:
  destination:
    namespace: go-api
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: go-api
      repoURL: https://luciocarvalhojr.github.io/helm-charts
      targetRevision: 0.1.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
