apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observatory-auth-svc-config
  namespace: argocd
spec:
  destination:
    namespace: observatory
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      exclude: '*-values.yaml'
      recurse: false
    path: apps/observatory/
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
