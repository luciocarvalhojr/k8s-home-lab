apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-svc
  namespace: argocd
spec:
  destination:
    namespace: observatory
    server: https://kubernetes.default.svc
  project: default
  sources:
    # Chart from your Helm registry
    - chart: obvervatory-auth-svc
      helm:
        valueFiles:
          - $values/apps/observatory/auth-svc-values.yaml
      repoURL: https://luciocarvalhojr.github.io/helm-charts
      targetRevision: 0.1.3

    # Values from your k8s-home-lab repo
    - ref: values
      repoURL: https://github.com/luciocarvalhojr/k8s-home-lab
      targetRevision: main

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
