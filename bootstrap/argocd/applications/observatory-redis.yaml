apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  destination:
    namespace: observatory
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps/observatory/redis
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
