apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-api-config
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: identity/k8s-apiserver-oidc/
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
  syncPolicy:
    automated: {}
