apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: cert-manager
      helm:
        valueFiles:
          - $values/infrastructure/cert-manager/values.yaml
      repoURL: https://charts.jetstack.io
      targetRevision: v1.20.0
    - ref: values
      repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
      targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
