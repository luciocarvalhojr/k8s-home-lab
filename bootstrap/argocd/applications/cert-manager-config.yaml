apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: default
  source:
    path: infrastructure/cert-manager/
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
  syncPolicy:
    automated: {}
