apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-applications
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      exclude: 'values.yaml'
      recurse: true
    path: bootstrap/argocd/applications/
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
  syncPolicy:
    automated: {}
