apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: apps/myapp/overlays/prod
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: HEAD
  syncPolicy:
    automated: {}
