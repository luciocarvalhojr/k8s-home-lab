apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik-idp-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
    path: identity/idp/
    directory:
      recurse: false
      exclude: 'values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
