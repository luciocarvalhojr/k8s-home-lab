apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-nfs
  namespace: argocd
spec:
  project: default
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
    targetRevision: main
    path: infrastructure/storage/
    directory:
      recurse: true
      exclude: 'values.yaml'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
