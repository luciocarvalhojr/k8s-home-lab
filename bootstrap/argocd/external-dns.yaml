apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  sources:
    - chart: external-dns
      helm:
        valueFiles:
          - $values/infrastructure/external-dns/values.yaml
      repoURL: https://kubernetes-sigs.github.io/external-dns/
      targetRevision: v1.20.0
    - ref: values
      repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
