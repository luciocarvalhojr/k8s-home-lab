apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  destination:
    namespace: metallb-system
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://metallb.github.io/metallb
      chart: metallb
      targetRevision: v0.15.3
      helm:
        valueFiles:
          - $values/bootstrap/metallb/values.yaml
    - repoURL: https://github.com/luciocarvalhojr/k8s-home-lab.git
      targetRevision: main
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
