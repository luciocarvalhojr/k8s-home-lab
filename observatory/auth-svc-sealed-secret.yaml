---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: auth-svc-secret
  namespace: observatory
spec:
  encryptedData:
    OIDC_CLIENT_SECRET: 
    JWT_SECRET: ""      # SEAL ME: echo -n "your-jwt-secret" | kubeseal --raw --name auth-svc-secret --namespace observatory --cert sealed-secrets.pem
    REDIS_URL: ""       # SEAL ME: echo -n "redis://redis:6379/0" | kubeseal --raw --name auth-svc-secret --namespace observatory --cert sealed-secrets.pem
  template:
    metadata:
      name: auth-svc-secret
      namespace: observatory
    type: Opaque
