architecture: standalone

auth:
  enabled: false

master:
  # Cache-only: no persistence needed
  persistence:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Expose as "redis" so auth-svc can reach it via redis:6379
  service:
    type: ClusterIP

# Disable replica — standalone mode ignores this,
# but being explicit avoids confusion
replica:
  replicaCount: 0